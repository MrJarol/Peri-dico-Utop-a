<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="256" height="256">
  <!-- Fondo redondeado -->
  <rect x="5" y="10" width="70" height="85" rx="6" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>

  <!-- Periódico principal -->
  <rect x="15" y="5" width="70" height="85" rx="5" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Línea superior decorativa -->
  <rect x="18" y="8" width="64" height="3" rx="1.5" fill="#F44336"/>

  <!-- Título del periódico -->
  <rect x="20" y="14" width="40" height="4" rx="2" fill="#1565C0"/>

  <!-- Imagen/ilustración del periódico -->
  <rect x="20" y="22" width="25" height="18" rx="2" fill="#90CAF9"/>
  <circle cx="32.5" cy="31" r="5" fill="#42A5F5"/>
  <polygon points="20,40 28,30 35,35 45,25 45,40" fill="#1565C0" opacity="0.3"/>

  <!-- Líneas de texto del periódico -->
  <rect x="48" y="22" width="32" height="2.5" rx="1.25" fill="#BDBDBD"/>
  <rect x="48" y="26" width="28" height="2.5" rx="1.25" fill="#BDBDBD"/>
  <rect x="48" y="30" width="30" height="2.5" rx="1.25" fill="#BDBDBD"/>
  <rect x="48" y="34" width="24" height="2.5" rx="1.25" fill="#BDBDBD"/>

  <!-- Líneas de texto inferiores -->
  <rect x="20" y="44" width="60" height="2.5" rx="1.25" fill="#9E9E9E"/>
  <rect x="20" y="49" width="55" height="2.5" rx="1.25" fill="#9E9E9E"/>
  <rect x="20" y="54" width="58" height="2.5" rx="1.25" fill="#9E9E9E"/>
  <rect x="20" y="59" width="50" height="2.5" rx="1.25" fill="#9E9E9E"/>
  <rect x="20" y="64" width="54" height="2.5" rx="1.25" fill="#9E9E9E"/>

  <!-- Pie de página decorativo -->
  <rect x="20" y="74" width="60" height="1.5" rx="0.75" fill="#E0E0E0"/>
  <rect x="20" y="78" width="40" height="2" rx="1" fill="#BDBDBD"/>
  <rect x="20" y="82" width="30" height="2" rx="1" fill="#BDBDBD"/>

  <!-- Sombra sutil -->
  <rect x="17" y="87" width="66" height="3" rx="1.5" fill="#000000" opacity="0.1"/>
</svg>